# Nginx configuration for Equipment Management System
# Копировать в: /etc/nginx/sites-available/equipment
# Активировать: ln -s /etc/nginx/sites-available/equipment /etc/nginx/sites-enabled/

upstream equipment_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name equipment.local;  # Замените на ваш домен/IP

    root /opt/equipment/public;

    # Максимальный размер загружаемого файла
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Static assets - serve directly from Nginx
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        try_files $uri =404;
    }

    # Health check
    location /up {
        proxy_pass http://equipment_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Main app
    location / {
        try_files $uri @rails;
    }

    location @rails {
        proxy_pass http://equipment_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Action Cable)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/equipment_access.log;
    error_log /var/log/nginx/equipment_error.log;
}
